name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/teacher-system

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r teacher-management-system/requirements.txt
          pip install pytest pytest-cov

      - name: Ensure instance directory exists
        run: mkdir -p teacher-management-system/instance

      - name: Verify templates exist
        run: |
          echo "=== Templates directory ==="
          ls -la teacher-management-system/templates/ || echo "templates dir not found"
          echo "=== Classes templates ==="
          ls -la teacher-management-system/templates/classes/ || echo "classes dir not found"
          echo "=== Index.html ==="
          ls -la teacher-management-system/templates/index.html || echo "index.html not found"

      - name: Run tests
        run: |
          cd teacher-management-system
          python -m pytest tests/test_basic.py -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    # 暂时禁用 Docker 构建 —— 等需要 Docker 部署时，把下面这行改成: if: github.event_name == 'push'
    if: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./teacher-management-system
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed - ${{ steps.meta.outputs.tags }}"
