version: '3.8'

services:
  teacher-system:
    image: DOCKER_USERNAME/teacher-system:latest
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-me}
      - FLASK_ENV=production
    volumes:
      - ./instance:/app/instance
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
