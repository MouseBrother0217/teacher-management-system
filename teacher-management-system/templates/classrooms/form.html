{% extends 'base.html' %}

{% block title %}{% if classroom %}编辑教室{% else %}新增教室{% endif %} - 系统管理中心{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <span class="card-title">{% if classroom %}✏️ 编辑教室{% else %}➕ 新增教室{% endif %}</span>
    </div>
    <div class="card-body">
        <form method="post" action="{% if classroom %}/classrooms/{{ classroom.id }}/edit{% else %}/classrooms/new{% endif %}">
            <div class="form-section">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">教室名称 <span class="required">*</span></label>
                        <input type="text" name="name" class="form-input" value="{{ classroom.name if classroom else '' }}" placeholder="如：A101多媒体教室" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">校区 <span class="required">*</span></label>
                        <select name="campus" class="form-select" required>
                            <option value="">请选择</option>
                            <option value="主校区" {% if classroom and classroom.campus == '主校区' %}selected{% endif %}>主校区</option>
                            <option value="分校区" {% if classroom and classroom.campus == '分校区' %}selected{% endif %}>分校区</option>
                            <option value=" online" {% if classroom and classroom.campus == 'online' %}selected{% endif %}>线上</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">教室类型</label>
                        <select name="type" class="form-select">
                            <option value="">请选择</option>
                            <option value="多媒体教室" {% if classroom and classroom.type == '多媒体教室' %}selected{% endif %}>多媒体教室</option>
                            <option value="会议室" {% if classroom and classroom.type == '会议室' %}selected{% endif %}>会议室</option>
                            <option value="报告厅" {% if classroom and classroom.type == '报告厅' %}selected{% endif %}>报告厅</option>
                            <option value="实验室" {% if classroom and classroom.type == '实验室' %}selected{% endif %}>实验室</option>
                            <option value="其他" {% if classroom and classroom.type == '其他' %}selected{% endif %}>其他</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">容纳人数</label>
                        <input type="number" name="capacity" class="form-input" value="{{ classroom.capacity if classroom else '' }}" placeholder="0">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">参考价格（元/天）</label>
                        <input type="number" name="price" class="form-input" value="{{ classroom.price if classroom else '' }}" placeholder="0.00" step="0.01">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">状态</label>
                        <select name="status" class="form-select">
                            <option value="可用" {% if classroom and classroom.status == '可用' %}selected{% endif %}>可用</option>
                            <option value="占用" {% if classroom and classroom.status == '占用' %}selected{% endif %}>占用</option>
                            <option value="维修中" {% if classroom and classroom.status == '维修中' %}selected{% endif %}>维修中</option>
                            <option value="停用" {% if classroom and classroom.status == '停用' %}selected{% endif %}>停用</option>
                        </select>
                    </div>
                    
                    <div class="form-group form-group-full">
                        <label class="form-label">教室地址</label>
                        <input type="text" name="address" class="form-input" value="{{ classroom.address if classroom else '' }}" placeholder="如：教学楼A栋1层">
                    </div>
                    
                    <div class="form-group form-group-full">
                        <label class="form-label">详细介绍</label>
                        <textarea name="description" class="form-textarea" rows="4" placeholder="教室设施、配置等详细说明">{{ classroom.description if classroom else '' }}</textarea>
                    </div>
                    
                    <div class="form-group form-group-full">
                        <label class="form-label">教室图片</label>
                        <div class="image-upload">
                            <input type="file" name="images" class="file-input" multiple accept="image/*">
                            <p style="font-size: 12px; color: #999; margin-top: 4px;">支持上传多张图片，建议尺寸 800x600</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 保存</button>
                <a href="/classrooms" class="btn btn-default">取消</a>
            </div>
        </form>
    </div>
</div>

<style>
.form-section {
    margin-bottom: 32px;
}
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px 24px;
}
.form-group {
    display: flex;
    flex-direction: column;
}
.form-group-full {
    grid-column: span 2;
}
.form-label {
    font-size: 14px;
    color: #333;
    margin-bottom: 8px;
    font-weight: 500;
}
.required {
    color: #ff4d4f;
}
.form-input,
.form-select,
.form-textarea {
    padding: 10px 12px;
    border: 1px solid #d9d9d9;
    border-radius: 4px;
    font-size: 14px;
    transition: all 0.3s;
}
.form-input:focus,
.form-select:focus,
.form-textarea:focus {
    border-color: #1890ff;
    outline: none;
    box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
}
.form-textarea {
    resize: vertical;
    min-height: 80px;
}
.image-upload {
    padding: 16px;
    border: 2px dashed #d9d9d9;
    border-radius: 4px;
    background: #fafafa;
}
.file-input {
    width: 100%;
}
.form-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    padding-top: 24px;
    border-top: 1px solid #f0f0f0;
}
</style>
{% endblock %}
